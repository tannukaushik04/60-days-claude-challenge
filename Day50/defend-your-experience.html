<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Defend Your Experience — Tannu Kaushik</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0B0D10;
  --surface:#14171C;
  --surface-raised:#1A1E24;
  --border:#22262C;
  --border-soft:#1C2027;
  --text:#ECEEF1;
  --text-muted:#8A919C;
  --text-dim:#565C66;
  --accent:#4C8DFF;
  --accent-soft:rgba(76,141,255,0.12);
  --good:#34D399;
  --good-soft:rgba(52,211,153,0.12);
  --warn:#F5A623;
  --warn-soft:rgba(245,166,35,0.12);
  --danger:#F2545B;
  --danger-soft:rgba(242,84,91,0.12);
  --disp:'Space Grotesk',sans-serif;
  --body:'Inter',sans-serif;
  --mono:'JetBrains Mono',monospace;
  --radius:14px;
}
*{box-sizing:border-box;margin:0;padding:0;}
html{-webkit-font-smoothing:antialiased;}
body{
  background:var(--bg);
  color:var(--text);
  font-family:var(--body);
  min-height:100vh;
  overflow-x:hidden;
}
@media (prefers-reduced-motion: reduce){
  *{animation-duration:0.01ms !important; animation-iteration-count:1 !important; transition-duration:0.01ms !important;}
}
::selection{background:var(--accent-soft);color:var(--text);}
a{color:inherit;}
button{font-family:inherit;cursor:pointer;}
button:focus-visible, [tabindex]:focus-visible, input:focus-visible, textarea:focus-visible{
  outline:2px solid var(--accent); outline-offset:2px;
}

.app{display:grid; grid-template-columns:1fr; min-height:100vh;}
.topbar{
  position:sticky; top:0; z-index:40;
  display:flex; align-items:center; justify-content:space-between;
  padding:14px 28px;
  background:rgba(11,13,16,0.85);
  backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border-soft);
}
.brand{display:flex; align-items:center; gap:10px;}
.brand-mark{
  width:26px;height:26px;border-radius:7px;
  background:linear-gradient(135deg,var(--accent),#8B5CF6);
  display:flex;align-items:center;justify-content:center;
  font-family:var(--disp); font-weight:700; font-size:13px; color:#fff;
}
.brand-name{font-family:var(--disp); font-weight:600; font-size:15px; letter-spacing:0.01em;}
.brand-sub{font-size:11px;color:var(--text-dim); font-family:var(--mono);}
.top-actions{display:flex; gap:10px; align-items:center;}
.btn{
  border:1px solid var(--border); background:var(--surface); color:var(--text);
  padding:8px 14px; border-radius:9px; font-size:13px; font-weight:500;
  transition:border-color .15s ease, background .15s ease, transform .1s ease;
  display:inline-flex; align-items:center; gap:6px;
}
.btn:hover{border-color:#333940; background:var(--surface-raised);}
.btn:active{transform:scale(0.97);}
.btn-primary{background:var(--accent); border-color:var(--accent); color:#fff;}
.btn-primary:hover{background:#3D7CE0; border-color:#3D7CE0;}
.btn-ghost{background:transparent; border-color:transparent; color:var(--text-muted);}
.btn-ghost:hover{color:var(--text); background:var(--surface);}
.btn-danger{color:var(--danger); border-color:rgba(242,84,91,0.3);}
.btn:disabled{opacity:0.4; cursor:not-allowed; transform:none;}

.stage{max-width:1180px; margin:0 auto; padding:36px 28px 90px; width:100%;}
.screen{animation:fadeUp .5s cubic-bezier(.16,1,.3,1);}
@keyframes fadeUp{from{opacity:0; transform:translateY(10px);} to{opacity:1; transform:translateY(0);}}

.hero{display:grid; grid-template-columns:1.15fr 0.85fr; gap:48px; align-items:start; padding:38px 0 8px;}
@media (max-width:900px){.hero{grid-template-columns:1fr;}}
.eyebrow{
  font-family:var(--mono); font-size:11.5px; letter-spacing:0.14em; text-transform:uppercase;
  color:var(--accent); margin-bottom:16px; display:flex; align-items:center; gap:8px;
}
.eyebrow::before{content:''; width:16px; height:1px; background:var(--accent);}
.hero h1{font-family:var(--disp); font-size:44px; line-height:1.08; font-weight:600; letter-spacing:-0.01em; margin-bottom:18px;}
.hero h1 em{font-style:normal; color:var(--accent);}
.hero p.lead{font-size:16px; color:var(--text-muted); line-height:1.65; max-width:52ch; margin-bottom:26px;}
.hero-stats{display:flex; gap:28px; margin-top:8px; flex-wrap:wrap;}
.hstat{display:flex; flex-direction:column; gap:3px;}
.hstat b{font-family:var(--disp); font-size:24px; font-weight:600;}
.hstat span{font-size:12px; color:var(--text-dim);}

.ledger-card{background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:22px; position:relative; overflow:hidden;}
.ledger-card::before{content:''; position:absolute; inset:0; opacity:0.5; pointer-events:none; background:radial-gradient(circle at 100% 0%, rgba(76,141,255,0.08), transparent 60%);}
.ledger-title{font-family:var(--mono); font-size:11px; color:var(--text-dim); text-transform:uppercase; letter-spacing:0.1em; margin-bottom:14px; display:flex; justify-content:space-between;}
.ledger-row{display:flex; align-items:center; justify-content:space-between; gap:10px; padding:10px 0; border-bottom:1px solid var(--border-soft); font-size:13px;}
.ledger-row:last-child{border-bottom:none;}
.ledger-claim{color:var(--text); font-weight:500; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; max-width:190px;}
.pill{font-family:var(--mono); font-size:10.5px; padding:2px 8px; border-radius:20px; font-weight:600; white-space:nowrap;}
.pill-pending{background:var(--surface-raised); color:var(--text-dim); border:1px solid var(--border);}

.step-list{display:flex; flex-direction:column; gap:0; margin-top:30px; border-top:1px solid var(--border-soft);}
.step-item{display:grid; grid-template-columns:32px 1fr; gap:14px; padding:16px 0; border-bottom:1px solid var(--border-soft);}
.step-num{font-family:var(--mono); font-size:12px; color:var(--accent); padding-top:2px;}
.step-item h4{font-size:14px; font-weight:600; margin-bottom:3px;}
.step-item p{font-size:13px; color:var(--text-muted); line-height:1.5;}

.upload-zone{margin-top:26px; border:1.5px dashed var(--border); border-radius:var(--radius); padding:22px; text-align:center; transition:border-color .15s, background .15s; background:var(--surface); cursor:pointer;}
.upload-zone.drag{border-color:var(--accent); background:var(--accent-soft);}
.upload-zone p{font-size:13px; color:var(--text-muted);}
.upload-zone strong{color:var(--text);}
.upload-zone input{display:none;}

.section-head{display:flex; align-items:baseline; justify-content:space-between; margin-bottom:20px; flex-wrap:wrap; gap:10px;}
.section-head h2{font-family:var(--disp); font-size:24px; font-weight:600;}
.section-head p{font-size:13px; color:var(--text-muted);}
.claims-grid{display:grid; grid-template-columns:repeat(auto-fill, minmax(300px,1fr)); gap:14px; margin-bottom:30px;}
.claim-card{background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:16px 18px; transition:border-color .15s, transform .15s;}
.claim-card:hover{border-color:#333940;}
.claim-tag{font-family:var(--mono); font-size:10px; text-transform:uppercase; letter-spacing:.08em; color:var(--accent); margin-bottom:8px; display:block;}
.claim-text{font-size:14px; line-height:1.5; color:var(--text);}
.claim-source{font-size:11.5px; color:var(--text-dim); margin-top:8px; font-family:var(--mono);}

.interview-layout{display:grid; grid-template-columns:1fr 300px; gap:26px; align-items:start;}
@media (max-width:940px){.interview-layout{grid-template-columns:1fr;} .sidebar{order:-1;}}

.progress-wrap{margin-bottom:22px;}
.progress-top{display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; font-size:12px; color:var(--text-muted); font-family:var(--mono);}
.progress-bar{height:5px; background:var(--surface-raised); border-radius:6px; overflow:hidden;}
.progress-fill{height:100%; background:linear-gradient(90deg,var(--accent),#8B5CF6); border-radius:6px; transition:width .5s cubic-bezier(.16,1,.3,1);}

.persona-badge{display:inline-flex; align-items:center; gap:8px; padding:6px 12px; border-radius:20px; font-size:12px; font-weight:600; margin-bottom:18px; border:1px solid var(--border);}
.persona-dot{width:7px; height:7px; border-radius:50%;}
.persona-friendly{color:var(--good); background:var(--good-soft); border-color:rgba(52,211,153,0.25);}
.persona-friendly .persona-dot{background:var(--good);}
.persona-tough{color:var(--warn); background:var(--warn-soft); border-color:rgba(245,166,35,0.25);}
.persona-tough .persona-dot{background:var(--warn);}
.persona-skeptical{color:var(--danger); background:var(--danger-soft); border-color:rgba(242,84,91,0.25);}
.persona-skeptical .persona-dot{background:var(--danger);}

.qa-thread{display:flex; flex-direction:column; gap:16px; margin-bottom:20px;}
.bubble{border-radius:14px; padding:16px 18px; font-size:14.5px; line-height:1.6; animation:fadeUp .4s ease; max-width:100%;}
.bubble-q{background:var(--surface); border:1px solid var(--border); border-top-left-radius:4px;}
.bubble-q .claim-target{font-family:var(--mono); font-size:10.5px; color:var(--accent); text-transform:uppercase; letter-spacing:.06em; margin-bottom:8px; display:block;}
.bubble-a{background:var(--accent-soft); border:1px solid rgba(76,141,255,0.25); margin-left:auto; border-top-right-radius:4px; max-width:92%;}
.bubble-feedback{font-size:12.5px; color:var(--text-muted); border-left:2px solid var(--border); padding-left:12px; margin-top:2px;}
.score-chip{display:inline-flex; align-items:center; gap:6px; font-family:var(--mono); font-size:11px; font-weight:600; padding:3px 9px; border-radius:20px; margin-top:10px;}
.score-high{background:var(--good-soft); color:var(--good);}
.score-mid{background:var(--warn-soft); color:var(--warn);}
.score-low{background:var(--danger-soft); color:var(--danger);}

.answer-box{background:var(--surface); border:1px solid var(--border); border-radius:14px; padding:6px; display:flex; flex-direction:column; gap:8px;}
.answer-box textarea{width:100%; min-height:100px; background:transparent; border:none; resize:vertical; color:var(--text); font-family:var(--body); font-size:14.5px; line-height:1.6; padding:10px 12px;}
.answer-box textarea:focus{outline:none;}
.answer-actions{display:flex; justify-content:space-between; align-items:center; padding:2px 8px 6px;}
.hint{font-size:11.5px; color:var(--text-dim);}

.thinking{display:flex; align-items:center; gap:10px; padding:14px 18px; color:var(--text-muted); font-size:13px;}
.dot-flash{display:flex; gap:4px;}
.dot-flash span{width:6px; height:6px; border-radius:50%; background:var(--text-dim); animation:blink 1.2s infinite ease-in-out;}
.dot-flash span:nth-child(2){animation-delay:.2s;} .dot-flash span:nth-child(3){animation-delay:.4s;}
@keyframes blink{0%,80%,100%{opacity:.25;} 40%{opacity:1;}}

.error-banner{background:var(--danger-soft); border:1px solid rgba(242,84,91,0.3); color:#FFB3B7; border-radius:10px; padding:12px 16px; font-size:13px; display:flex; justify-content:space-between; align-items:center; gap:12px; margin-bottom:14px;}

.sidebar{position:sticky; top:80px; display:flex; flex-direction:column; gap:16px;}
.side-card{background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:18px;}
.side-title{font-family:var(--mono); font-size:11px; text-transform:uppercase; letter-spacing:.1em; color:var(--text-dim); margin-bottom:14px;}
.meter-row{margin-bottom:14px;}
.meter-row:last-child{margin-bottom:0;}
.meter-top{display:flex; justify-content:space-between; font-size:12.5px; margin-bottom:6px;}
.meter-top span:first-child{color:var(--text); font-weight:500; max-width:180px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
.meter-top span:last-child{font-family:var(--mono); color:var(--text-muted);}
.meter-track{height:5px; background:var(--surface-raised); border-radius:6px; overflow:hidden;}
.meter-fill{height:100%; border-radius:6px; transition:width .6s cubic-bezier(.16,1,.3,1);}
.meter-fill.good{background:var(--good);} .meter-fill.mid{background:var(--warn);} .meter-fill.low{background:var(--danger);} .meter-fill.none{background:var(--border);}

.report-hero{text-align:center; padding:20px 0 40px;}
.overall-ring{width:150px; height:150px; margin:0 auto 18px; position:relative; display:flex; align-items:center; justify-content:center;}
.overall-ring svg{transform:rotate(-90deg);}
.overall-ring .ring-label{position:absolute; text-align:center;}
.overall-ring .ring-label b{font-family:var(--disp); font-size:34px; display:block;}
.overall-ring .ring-label span{font-size:11px; color:var(--text-dim); font-family:var(--mono);}
.report-hero h2{font-family:var(--disp); font-size:26px; margin-bottom:8px;}
.report-hero p{color:var(--text-muted); font-size:14px; max-width:50ch; margin:0 auto;}

.report-cols{display:grid; grid-template-columns:1fr 1fr; gap:20px; margin-top:10px;}
@media (max-width:820px){.report-cols{grid-template-columns:1fr;}}
.rcol{background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:20px;}
.rcol-head{display:flex; align-items:center; gap:8px; margin-bottom:16px; font-family:var(--disp); font-weight:600; font-size:15px;}
.rcol-head .dot{width:9px; height:9px; border-radius:50%;}
.rcol.good-col .dot{background:var(--good);}
.rcol.weak-col .dot{background:var(--danger);}
.report-item{padding:14px 0; border-bottom:1px solid var(--border-soft);}
.report-item:last-child{border-bottom:none;}
.report-item h5{font-size:13.5px; font-weight:600; margin-bottom:5px;}
.report-item p{font-size:12.5px; color:var(--text-muted); line-height:1.55;}
.report-item .score-chip{margin-top:8px; margin-left:0;}

.transcript-toggle{margin-top:30px;}
.transcript-block{margin-top:16px; display:none;}
.transcript-block.open{display:block;}
.transcript-entry{padding:14px 0; border-bottom:1px solid var(--border-soft);}
.transcript-entry .q{color:var(--text); font-size:13.5px; margin-bottom:6px;}
.transcript-entry .a{color:var(--text-muted); font-size:13.5px; padding-left:14px; border-left:2px solid var(--accent);}

.report-actions{display:flex; gap:10px; justify-content:center; margin-top:34px; flex-wrap:wrap;}

.empty-state{text-align:center; padding:60px 20px; color:var(--text-muted);}
.empty-state .glyph{font-size:30px; margin-bottom:14px; opacity:.5;}

.toast{position:fixed; bottom:22px; left:50%; transform:translateX(-50%) translateY(20px); opacity:0; background:var(--surface-raised); border:1px solid var(--border); padding:11px 18px; border-radius:10px; font-size:13px; z-index:100; transition:opacity .25s, transform .25s; pointer-events:none;}
.toast.show{opacity:1; transform:translateX(-50%) translateY(0);}

.footer-note{text-align:center; color:var(--text-dim); font-size:11.5px; margin-top:60px; font-family:var(--mono);}
</style>
</head>
<body>

<div class="app">
  <div class="topbar">
    <div class="brand">
      <div class="brand-mark">DY</div>
      <div>
        <div class="brand-name">Defend Your Experience</div>
        <div class="brand-sub" id="topbarSub">claim-by-claim interview rehearsal</div>
      </div>
    </div>
    <div class="top-actions" id="topActions"></div>
  </div>

  <div class="stage" id="stage"></div>
</div>

<div class="toast" id="toast"></div>

<script>
const RESUME_TEXT = `TANNU KAUSHIK
MCA graduate with a strong foundation in object-oriented programming using Java and Python. Proficient in designing, developing, and testing full-stack applications using Python, Flask, Java, Spring Boot, and MySQL. Built multiple end-to-end projects, including AI-assisted healthcare, management systems, and database-driven applications. Passionate about software development, problem-solving, and writing clean, scalable code. Seeking an entry-level Software Developer role.
SKILLS: Python, Java, C++, SQL, HTML, CSS, JavaScript, Flask, Spring Boot, Bootstrap, NumPy, Pandas, Matplotlib, MySQL, PostgreSQL, VS Code, Jupyter Notebook, Excel.
PROJECT — HerHealth AI System (Python, Flask, MySQL, HTML, CSS, JavaScript): Developed an AI-powered women's healthcare management platform to track menstrual cycles, symptoms, mood, lifestyle, and medical history. Integrated an AI chatbot, healthcare analytics, and automated PDF report generation to deliver personalized health insights.
PROJECT — Cafe Management System (Python, Flask, MySQL, HTML, CSS, JavaScript): Designed and developed a unified platform to manage menu items, order processing, billing, staff details, and customer feedback collection.
PROJECT — Student Management System (Java, Spring Boot, MySQL, HTML, CSS): Built a Java-based application to track and manage student profiles, registrations, and grades.
EDUCATION: MCA, Institute of Management Studies, Gautam Buddh Nagar (2024-2026), CGPA 8.31/10. BCA, Mewar Institute of Management, Ghaziabad (2020-2023), 74.08%.
CERTIFICATIONS: NPTEL — Fundamentals of OOP (Elite+Silver), Python for Data Science (Elite+Silver), Data Analytics with Python (Elite), Mathematical Foundation of ML (Elite), DBMS, Data Structures and Algorithms using Java. Infosys Springboard — Basics of Python, Python Fundamentals, AI Primer. Reliance Foundation — Data Science.
ACHIEVEMENTS: Participated in PieceCode 1.0, an internal hackathon by School of IT, IMS Noida, collaborated on developing and presenting a software solution within a limited timeframe. Qualified for and participated in North Zonal Finals of the National Inter-College Crossword Expedition (NICE).`;

const CLAIMS = [
  {id:"c1", tag:"Platform", text:"Developed an AI-powered women's healthcare management platform (HerHealth AI) with chatbot, analytics and PDF reports.", source:"Projects · HerHealth AI System"},
  {id:"c2", tag:"Full-stack", text:"Proficient in designing, developing, and testing full-stack applications using Python, Flask, Java, Spring Boot, and MySQL.", source:"Professional Summary"},
  {id:"c3", tag:"System design", text:"Designed and developed a unified Cafe Management System covering menu, orders, billing, staff and feedback.", source:"Projects · Cafe Management System"},
  {id:"c4", tag:"Backend", text:"Built a Java-based Student Management System using Spring Boot and MySQL to track profiles, registrations and grades.", source:"Projects · Student Management System"},
  {id:"c5", tag:"Teamwork", text:"Collaborated on developing and presenting a software solution within a limited timeframe at PieceCode 1.0 hackathon.", source:"Achievements"},
  {id:"c6", tag:"Fundamentals", text:"Strong foundation in object-oriented programming using Java and Python, backed by NPTEL Elite+Silver certification.", source:"Skills / Certifications"},
  {id:"c7", tag:"Academics", text:"MCA CGPA of 8.31/10, positioned as evidence of technical strength for an entry-level developer role.", source:"Education"}
];

const STORAGE_KEY = "dye_session_v1";
let state = {
  screen: "intro",
  persona: null,
  history: [],
  currentQuestion: null,
  claimScores: {},
  questionCount: 0,
  maxQuestions: 10,
  loading: false,
  error: null,
  report: null
};

function saveSession(){
  try{ localStorage.setItem(STORAGE_KEY, JSON.stringify({history:state.history, claimScores:state.claimScores, questionCount:state.questionCount, report:state.report})); }catch(e){}
}
function loadSession(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(raw){
      const d = JSON.parse(raw);
      state.history = d.history || [];
      state.claimScores = d.claimScores || {};
      state.questionCount = d.questionCount || 0;
      state.report = d.report || null;
    }
  }catch(e){}
}
loadSession();

function toast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2400);
}

async function callClaude(system, messages, retries=3){
  for(let attempt=0; attempt<=retries; attempt++){
    try{
      const response = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
          model: "claude-sonnet-4-6",
          max_tokens: 1000,
          system: system,
          messages: messages
        })
      });
      if(response.status === 429 || response.status === 529){
        if(attempt < retries){
          await new Promise(r=>setTimeout(r, 900 * Math.pow(2, attempt)));
          continue;
        }
        throw new Error("RATE_LIMIT");
      }
      if(!response.ok){
        throw new Error("HTTP_" + response.status);
      }
      const data = await response.json();
      const textBlocks = (data.content || []).filter(b=>b.type==="text").map(b=>b.text);
      return textBlocks.join("\n").trim();
    }catch(err){
      if(attempt >= retries) throw err;
      await new Promise(r=>setTimeout(r, 700 * Math.pow(2, attempt)));
    }
  }
}

function safeJsonParse(text){
  let t = text.trim();
  t = t.replace(/^```json/i,'').replace(/^```/,'').replace(/```$/,'').trim();
  const start = t.indexOf('{');
  const end = t.lastIndexOf('}');
  if(start >= 0 && end > start) t = t.substring(start, end+1);
  try{ return JSON.parse(t); }catch(e){ return null; }
}

const PERSONAS = [
  {key:"friendly", label:"Friendly HR", cls:"persona-friendly", desc:"warm, curious, wants a clear story"},
  {key:"tough", label:"Tough Technical", cls:"persona-tough", desc:"precise, wants specifics and depth"},
  {key:"skeptical", label:"Skeptical Panel", cls:"persona-skeptical", desc:"doubts the claim, pushes for proof"}
];
function pickPersona(){ return PERSONAS[Math.floor(Math.random()*PERSONAS.length)]; }

function buildSystemPrompt(){
  return `You are simulating a mixed interview panel evaluating a candidate's resume for an entry-level Software Developer role. Your job is to be an intelligent, specific skeptic — never generic. You have the candidate's full resume text below. Every question you ask must reference a specific claim, project, tool, or number from THIS resume — never a generic interview-template question.

RESUME:
${RESUME_TEXT}

CLAIMS LIST (id: text):
${CLAIMS.map(c=>`${c.id}: ${c.text}`).join("\n")}

Rules:
- Each question should target exactly one claim id from the CLAIMS LIST (reuse a claim if the previous answer was weak, to dig deeper; move to a new claim once a claim feels well defended).
- Question difficulty and follow-up depth must escalate based on how the candidate answered previously — vague or generic answers should be challenged harder (ask for numbers, edge cases, what broke, why a decision was made, what they'd do differently).
- Adopt the persona given to you (friendly HR / tough technical / skeptical panel) in tone only — the underlying scrutiny stays sharp.
- Never invent facts not present in the resume; challenge based on what's actually written or what's suspiciously absent (e.g. no metrics, no team size, no mention of testing, no scale details).
- Keep questions to 1-3 sentences, conversational, no bullet lists.
Always respond ONLY with strict JSON, no markdown fences, no preamble, in this exact shape:
{"question": "...", "claimId": "c1", "challengeType": "vague-claim|missing-evidence|metrics|scale|ownership|tradeoff|failure-mode|depth", "personaNote": "one clause on why this persona would ask it"}`;
}

function buildScoringSystemPrompt(){
  return `You are scoring how well a candidate just defended a specific resume claim during a mock interview. Be a strict, fair evaluator — do not inflate scores. Score 0-100 where: 0-39 = vague/unsupported, deflects or repeats the resume without new detail; 40-69 = partially defended, some specifics but missing depth, numbers, or reasoning; 70-100 = well defended, specific, honest, includes concrete detail (numbers, decisions, tradeoffs, what they'd change).
Respond ONLY with strict JSON, no markdown fences:
{"score": 0-100, "feedback": "one or two sentences of direct, specific, constructive feedback referencing what was strong or missing in THIS answer"}`;
}

function render(){
  const stage = document.getElementById('stage');
  const topActions = document.getElementById('topActions');
  const topbarSub = document.getElementById('topbarSub');
  topActions.innerHTML = "";

  if(state.screen === "intro"){
    topbarSub.textContent = "claim-by-claim interview rehearsal";
    renderIntro(stage);
  } else if(state.screen === "claims"){
    topbarSub.textContent = "7 claims extracted";
    renderClaims(stage);
    addTopAction(topActions, "Start over", "btn-ghost", resetAll);
  } else if(state.screen === "interview"){
    topbarSub.textContent = `question ${state.questionCount} of ${state.maxQuestions}`;
    renderInterview(stage);
    addTopAction(topActions, "End & get report", "btn-primary", ()=>generateReport());
    addTopAction(topActions, "Start over", "btn-ghost", resetAll);
  } else if(state.screen === "report"){
    topbarSub.textContent = "defense report";
    renderReport(stage);
    addTopAction(topActions, "Continue defending", "btn", ()=>{state.screen="interview"; render();});
    addTopAction(topActions, "Start over", "btn-ghost", resetAll);
  }
}
function addTopAction(container, label, cls, fn){
  const b = document.createElement('button');
  b.className = "btn " + cls;
  b.textContent = label;
  b.onclick = fn;
  container.appendChild(b);
}

  stage.innerHTML = `
  <div class="screen">
    <div class="hero">
      <div>
        <div class="eyebrow">Interview rehearsal, not resume review</div>
        <h1>We already read your resume.<br>Now <em>defend it.</em></h1>
        <p class="lead">Every bullet point on your resume is a claim someone can challenge in a real interview. This is a mixed panel — friendly HR, a tough technical lead, and a skeptical senior interviewer — taking turns pressing you on specifics: numbers, decisions, what broke, what you'd change.</p>
        <div class="hero-stats">
          <div class="hstat"><b>${CLAIMS.length}</b><span>claims extracted</span></div>
          <div class="hstat"><b>3</b><span>panel personas</span></div>

        </div>

        <div class="step-list">
          <div class="step-item"><div class="step-num">01</div><div><h4>Review your claim ledger</h4><p>See exactly which statements from your resume will be put under scrutiny.</p></div></div>
          <div class="step-item"><div class="step-num">02</div><div><h4>Field live follow-ups</h4><p>The panel adapts each question to your previous answer — vague answers get pushed harder.</p></div></div>
          <div class="step-item"><div class="step-num">03</div><div><h4>Get your Defense Report</h4><p>See which claims are interview-ready and which need a sharper story before the real thing.</p></div></div>
        </div>
      </div>

      <div>
        <div class="ledger-card">
          <div class="ledger-title"><span>Claim Ledger</span><span>tannukaushik24@</span></div>
          ${CLAIMS.slice(0,5).map(c=>`
            <div class="ledger-row">
              <span class="ledger-claim">${c.tag}</span>
              <span class="pill pill-pending">untested</span>
            </div>`).join("")}
          <div class="ledger-row" style="border-bottom:none; padding-top:12px;">
            <span style="color:var(--text-dim); font-size:12px;">+ ${CLAIMS.length-5} more claims</span>
          </div>
        </div>

        <div class="upload-zone" id="uploadZone">
          <p><strong>Resume loaded: Tannu_Kaushik.pdf</strong><br>Drop a different resume / LinkedIn export here to re-extract claims, or continue with this one.</p>
          <input type="file" id="fileInput" accept=".txt,.md">
        </div>
      </div>
    </div>

    <div style="text-align:center; margin-top:10px;">
      <button class="btn btn-primary" style="padding:12px 26px; font-size:14px;" id="beginBtn">Review my claim ledger →</button>
    </div>

function renderClaims(stage){
  stage.innerHTML = `
  <div class="screen">
    <div class="section-head">
      <div>
        <h2>Your Claim Ledger</h2>
        <p>${CLAIMS.length} statements extracted directly from your resume. Each one will be challenged by the panel.</p>
      </div>
    </div>
    <div class="claims-grid">
      ${CLAIMS.map(c=>`
        <div class="claim-card">
          <span class="claim-tag">${c.tag}</span>
          <p class="claim-text">${c.text}</p>
          <div class="claim-source">${c.source}</div>
        </div>`).join("")}
    </div>
    <div style="text-align:center; margin-top:10px;">
      <button class="btn btn-primary" style="padding:12px 26px; font-size:14px;" id="startInterviewBtn">Face the panel →</button>
    </div>
  </div>`;
  document.getElementById('startInterviewBtn').onclick = ()=>{
    state.screen = "interview";
    render();
    if(state.history.length === 0){
      askNextQuestion();
    }
  };
}

function scoreClass(score){
  if(score >= 70) return "high";
  if(score >= 40) return "mid";
  return "low";
}
function meterClass(score){
  if(score === undefined || score === null) return "none";
  if(score >= 70) return "good";
  if(score >= 40) return "mid";
  return "low";
}

function renderInterview(stage){
  const pct = Math.min(100, Math.round((state.questionCount / state.maxQuestions) * 100));

  let threadHtml = "";
  state.history.forEach(item=>{
    const claim = CLAIMS.find(c=>c.id===item.claimId);
    threadHtml += `
      <div class="bubble bubble-q">
        <span class="claim-target">targeting: ${claim ? claim.tag : 'claim'} · ${item.challengeType || ''}</span>
        ${item.question}
      </div>
      <div class="bubble bubble-a">${escapeHtml(item.answer)}</div>
      ${item.feedback ? `<div class="bubble-feedback">${item.feedback}<div><span class="score-chip score-${scoreClass(item.score)}">Defense score: ${item.score}/100</span></div></div>` : ""}
    `;
  });

  let currentQBlock = "";
  if(state.currentQuestion){
    const claim = CLAIMS.find(c=>c.id===state.currentQuestion.claimId);
    currentQBlock = `
      <div class="bubble bubble-q">
        <span class="claim-target">targeting: ${claim ? claim.tag : 'claim'} · ${state.currentQuestion.challengeType || ''}</span>
        ${state.currentQuestion.question}
      </div>`;
  }

  let personaBlock = "";
  if(state.persona){
    const p = state.persona;
    personaBlock = `<div class="persona-badge ${p.cls}"><span class="persona-dot"></span>${p.label} — ${p.desc}</div>`;
  }

  let errorBlock = "";
  if(state.error){
    errorBlock = `<div class="error-banner"><span>${state.error}</span><button class="btn btn-ghost" style="color:#FFB3B7;" id="retryBtn">Retry</button></div>`;
  }

  let answerBlock = "";
  if(state.currentQuestion && !state.loading){
    answerBlock = `
      <div class="answer-box">
        <textarea id="answerInput" placeholder="Answer as if you're in the room. Be specific — numbers, decisions, what actually happened."></textarea>
        <div class="answer-actions">
          <span class="hint">The panel adapts its next question to what you write here.</span>
          <button class="btn btn-primary" id="submitAnswerBtn">Submit answer</button>
        </div>
      </div>`;
  }

  let thinkingBlock = "";
  if(state.loading){
    thinkingBlock = `<div class="thinking"><div class="dot-flash"><span></span><span></span><span></span></div>${state.loadingLabel || "The panel is thinking..."}</div>`;
  }

  stage.innerHTML = `
  <div class="screen">
    <div class="progress-wrap">
      <div class="progress-top"><span>DEFENSE SESSION</span><span>${state.questionCount}/${state.maxQuestions} questions</span></div>
      <div class="progress-bar"><div class="progress-fill" style="width:${pct}%;"></div></div>
    </div>

    <div class="interview-layout">
      <div>
        ${errorBlock}
        ${personaBlock}
        <div class="qa-thread">
          ${threadHtml}
          ${currentQBlock}
        </div>
        ${thinkingBlock}
        ${answerBlock}
        ${(!state.currentQuestion && !state.loading && !state.error) ? `<div class="empty-state"><div class="glyph">◆</div>Ready when you are.</div>` : ""}
      </div>

      <div class="sidebar">
        <div class="side-card">
          <div class="side-title">Confidence by claim</div>
          ${CLAIMS.map(c=>{
            const s = state.claimScores[c.id];
            const score = s ? s.score : null;
            return `<div class="meter-row">
              <div class="meter-top"><span>${c.tag}</span><span>${score!==null ? score+"/100" : "—"}</span></div>
              <div class="meter-track"><div class="meter-fill ${meterClass(score)}" style="width:${score!==null ? score : 0}%;"></div></div>
            </div>`;
          }).join("")}
        </div>
      </div>
    </div>
  </div>`;

  const submitBtn = document.getElementById('submitAnswerBtn');
  if(submitBtn){
    submitBtn.onclick = submitAnswer;
    const ta = document.getElementById('answerInput');
    ta.addEventListener('keydown', e=>{
      if(e.key === 'Enter' && (e.metaKey || e.ctrlKey)){ submitAnswer(); }
    });
    ta.focus();
  }
  const retryBtn = document.getElementById('retryBtn');
  if(retryBtn){
    retryBtn.onclick = ()=>{ state.error = null; askNextQuestion(); };
  }

  window.scrollTo({top: document.body.scrollHeight, behavior:'smooth'});
}

function escapeHtml(str){
  const d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}

async function askNextQuestion(){
  state.loading = true;
  state.loadingLabel = "The panel is preparing a question...";
  state.error = null;
  state.persona = pickPersona();
  render();

  try{
    const historyText = state.history.map(h=>{
      const claim = CLAIMS.find(c=>c.id===h.claimId);
      return `Q (targeting ${claim ? claim.tag : h.claimId}): ${h.question}\nA: ${h.answer}\nScore given: ${h.score}/100`;
    }).join("\n\n");

    const userMsg = `Persona to adopt for this next question: ${state.persona.label} (${state.persona.desc}).
Conversation so far (may be empty if this is the first question):
${historyText || "(no prior questions — ask an opening question about the strongest or most surprising claim on the resume)"}

Generate the next interview question now, following the JSON format exactly.`;

    const raw = await callClaude(buildSystemPrompt(), [{role:"user", content: userMsg}]);
    const parsed = safeJsonParse(raw);
    if(!parsed || !parsed.question){
      throw new Error("PARSE_FAIL");
    }
    state.currentQuestion = {
      question: parsed.question,
      claimId: CLAIMS.find(c=>c.id===parsed.claimId) ? parsed.claimId : CLAIMS[0].id,
      challengeType: parsed.challengeType || "depth"
    };
    state.loading = false;
    render();
  }catch(err){
    state.loading = false;
    state.error = err.message === "RATE_LIMIT"
      ? "The panel hit a rate limit. Give it a moment and retry."
      : "Something interrupted the panel's train of thought. Retry to continue.";
    render();
  }
}

async function submitAnswer(){
  const ta = document.getElementById('answerInput');
  const answer = ta.value.trim();
  if(!answer){ toast("Write an answer before submitting."); return; }

  const q = state.currentQuestion;
  state.loading = true;
  state.loadingLabel = "Scoring your defense...";
  state.currentQuestion = null;
  render();

  const pendingEntry = {question: q.question, claimId: q.claimId, challengeType: q.challengeType, answer: answer, score: null, feedback: null};

  try{
    const claim = CLAIMS.find(c=>c.id===q.claimId);
    const userMsg = `Claim being defended: ${claim ? claim.text : q.claimId}
Question asked: ${q.question}
Candidate's answer: ${answer}

Score this answer now, following the JSON format exactly.`;
    const raw = await callClaude(buildScoringSystemPrompt(), [{role:"user", content: userMsg}]);
    const parsed = safeJsonParse(raw);
    const score = parsed && typeof parsed.score === "number" ? Math.max(0, Math.min(100, Math.round(parsed.score))) : 50;
    const feedback = parsed && parsed.feedback ? parsed.feedback : "Answer recorded.";

    pendingEntry.score = score;
    pendingEntry.feedback = feedback;
    state.history.push(pendingEntry);

    const prev = state.claimScores[q.claimId];
    const attempts = prev ? prev.attempts + 1 : 1;
    const newScore = prev ? Math.round(prev.score * 0.4 + score * 0.6) : score;
    state.claimScores[q.claimId] = {score: newScore, attempts: attempts};

    state.questionCount += 1;
    state.loading = false;
    saveSession();

    if(state.questionCount >= state.maxQuestions){
      render();
      toast("Round complete — generating your Defense Report...");
      await generateReport();
    } else {
      render();
      askNextQuestion();
    }
  }catch(err){
    state.loading = false;
    state.error = err.message === "RATE_LIMIT"
      ? "The panel hit a rate limit while scoring. Retry to continue."
      : "Scoring was interrupted. Retry to continue.";
    state.currentQuestion = q;
    render();
  }
}

async function generateReport(){
  if(state.history.length === 0){
    toast("Answer at least one question before generating a report.");
    return;
  }
  state.screen = "report";
  state.loadingReport = true;
  render();

  try{
    const transcript = state.history.map(h=>{
      const claim = CLAIMS.find(c=>c.id===h.claimId);
      return `Claim: ${claim ? claim.text : h.claimId}\nQuestion: ${h.question}\nAnswer: ${h.answer}\nScore: ${h.score}/100\nFeedback: ${h.feedback}`;
    }).join("\n\n");

    const system = `You are compiling a final "Defense Report" for a candidate who just completed a mock interview defending claims from their resume. Base everything strictly on the transcript given — be specific to what was actually said, never generic. Respond ONLY with strict JSON, no markdown fences, in this exact shape:
{
  "overallScore": 0-100,
  "summary": "2-3 sentence honest overall assessment",
  "wellDefended": [{"claim": "short claim label", "note": "specific reason this is well defended, referencing what they actually said"}],
  "needsWork": [{"claim": "short claim label", "note": "specific gap in their defense", "fix": "one concrete, specific suggestion to strengthen it before a real interview"}]
}`;
    const userMsg = `Resume claims list:\n${CLAIMS.map(c=>`${c.tag}: ${c.text}`).join("\n")}\n\nFull transcript:\n${transcript}\n\nGenerate the Defense Report now.`;
    const raw = await callClaude(system, [{role:"user", content: userMsg}]);
    const parsed = safeJsonParse(raw);
    if(!parsed) throw new Error("PARSE_FAIL");
    state.report = parsed;
    state.loadingReport = false;
    saveSession();
    render();
  }catch(err){
    state.loadingReport = false;
    const entries = Object.entries(state.claimScores);
    const avg = entries.length ? Math.round(entries.reduce((s,[,v])=>s+v.score,0)/entries.length) : 0;
    state.report = {
      overallScore: avg,
      summary: "Live report generation hit an error, so here's a summary built from your recorded scores instead. Retry for a fully narrative report.",
      wellDefended: entries.filter(([,v])=>v.score>=70).map(([id,v])=>{const c=CLAIMS.find(x=>x.id===id); return {claim: c?c.tag:id, note:`Averaged ${v.score}/100 across ${v.attempts} attempt(s).`};}),
      needsWork: entries.filter(([,v])=>v.score<70).map(([id,v])=>{const c=CLAIMS.find(x=>x.id===id); return {claim: c?c.tag:id, note:`Averaged ${v.score}/100 across ${v.attempts} attempt(s).`, fix:"Revisit this claim with specific numbers and a concrete story."};})
    };
    render();
  }
}

function renderReport(stage){
  if(state.loadingReport){
    stage.innerHTML = `<div class="screen"><div class="thinking" style="justify-content:center; padding:80px 0;"><div class="dot-flash"><span></span><span></span><span></span></div>Compiling your Defense Report...</div></div>`;
    return;
  }
  if(!state.report){
    stage.innerHTML = `<div class="screen"><div class="empty-state"><div class="glyph">◆</div>No report yet. Answer some questions first.</div></div>`;
    return;
  }
  const r = state.report;
  const circumference = 2 * Math.PI * 62;
  const dash = circumference * (r.overallScore/100);
  const ringColor = r.overallScore>=70 ? "var(--good)" : r.overallScore>=40 ? "var(--warn)" : "var(--danger)";

  stage.innerHTML = `
  <div class="screen">
    <div class="report-hero">
      <div class="overall-ring">
        <svg width="150" height="150">
          <circle cx="75" cy="75" r="62" stroke="var(--surface-raised)" stroke-width="10" fill="none"/>
          <circle cx="75" cy="75" r="62" stroke="${ringColor}" stroke-width="10" fill="none"
            stroke-dasharray="${dash} ${circumference}" stroke-linecap="round"/>
        </svg>
        <div class="ring-label"><b>${r.overallScore}</b><span>OVERALL</span></div>
      </div>
      <h2>Your Defense Report</h2>
      <p>${r.summary}</p>
    </div>

    <div class="report-cols">
      <div class="rcol good-col">
        <div class="rcol-head"><span class="dot"></span>Well defended</div>
        ${r.wellDefended && r.wellDefended.length ? r.wellDefended.map(i=>`
          <div class="report-item">
            <h5>${i.claim}</h5>
            <p>${i.note}</p>
          </div>`).join("") : `<div class="empty-state" style="padding:20px 0;">None yet — keep going, strong defenses will appear here.</div>`}
      </div>
      <div class="rcol weak-col">
        <div class="rcol-head"><span class="dot"></span>Needs work</div>
        ${r.needsWork && r.needsWork.length ? r.needsWork.map(i=>`
          <div class="report-item">
            <h5>${i.claim}</h5>
            <p>${i.note}</p>
            <p style="color:var(--text); margin-top:6px;"><strong>Fix:</strong> ${i.fix}</p>
          </div>`).join("") : `<div class="empty-state" style="padding:20px 0;">Nothing flagged — nice work.</div>`}
      </div>
    </div>

    <div class="transcript-toggle">
      <button class="btn" id="transcriptBtn">Show full transcript</button>
      <div class="transcript-block" id="transcriptBlock">
        ${state.history.map(h=>`
          <div class="transcript-entry">
            <div class="q"><strong>Q:</strong> ${h.question}</div>
            <div class="a"><strong>A:</strong> ${escapeHtml(h.answer)} — <span class="score-chip score-${scoreClass(h.score)}" style="margin-top:0;">${h.score}/100</span></div>
          </div>`).join("")}
      </div>
    </div>

    <div class="report-actions">
      <button class="btn btn-primary" id="exportBtn">Export report (.json)</button>
      <button class="btn" id="exportTxtBtn">Export report (.txt)</button>
      <button class="btn btn-danger" id="clearBtn">Clear session</button>
    </div>
    <div class="footer-note">generated from your live transcript · re-run anytime for an updated score</div>
  </div>`;

  document.getElementById('transcriptBtn').onclick = ()=>{
    const b = document.getElementById('transcriptBlock');
    b.classList.toggle('open');
  };
  document.getElementById('exportBtn').onclick = exportJson;
  document.getElementById('exportTxtBtn').onclick = exportTxt;
  document.getElementById('clearBtn').onclick = resetAll;
}

function exportJson(){
  const payload = {generatedAt: new Date().toISOString(), report: state.report, transcript: state.history, claimScores: state.claimScores};
  downloadBlob(JSON.stringify(payload, null, 2), "defense-report.json", "application/json");
}
function exportTxt(){
  let txt = `DEFEND YOUR EXPERIENCE — DEFENSE REPORT\nGenerated ${new Date().toLocaleString()}\n\nOVERALL SCORE: ${state.report.overallScore}/100\n${state.report.summary}\n\nWELL DEFENDED:\n`;
  (state.report.wellDefended||[]).forEach(i=>{txt += `- ${i.claim}: ${i.note}\n`;});
  txt += `\nNEEDS WORK:\n`;
  (state.report.needsWork||[]).forEach(i=>{txt += `- ${i.claim}: ${i.note}\n  Fix: ${i.fix}\n`;});
  txt += `\nFULL TRANSCRIPT:\n`;
  state.history.forEach(h=>{txt += `\nQ: ${h.question}\nA: ${h.answer}\nScore: ${h.score}/100 — ${h.feedback}\n`;});
  downloadBlob(txt, "defense-report.txt", "text/plain");
}
function downloadBlob(content, filename, type){
  const blob = new Blob([content], {type});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
  toast("Downloaded " + filename);
}

function resetAll(){
  if(state.history.length && !confirm("This clears your current session and progress. Continue?")) return;
  state = {screen:"intro", persona:null, history:[], currentQuestion:null, claimScores:{}, questionCount:0, maxQuestions:10, loading:false, error:null, report:null};
  localStorage.removeItem(STORAGE_KEY);
  render();
}

(function init(){
  if(state.history.length > 0 && !state.report){
    state.screen = "interview";
  } else if(state.report){
    state.screen = "report";
  }
  render();
})();
</script>
</body>
</html>
